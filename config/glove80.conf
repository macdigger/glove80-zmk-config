# Per-key RGB underglow support (darknao/zmk rgb-layer-24.12)
CONFIG_EXPERIMENTAL_RGB_LAYER=y
CONFIG_ZMK_SPLIT_PERIPHERAL_HID_INDICATORS=y

# Allow GLOBE key (0x29D) - requires full consumer usage range
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_FULL=y

# RGB underglow on at boot, layer indicators effect
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=4

